services:
  streamlit:
    profiles: ["standalone"]
    build:
      context: .
      target: streamlit
    ports:
      - "8502:8501"
    env_file:
      - .env
    environment:
      RUN_MODE: standalone
      ENABLE_DATABASE: "false"
      ENABLE_RABBITMQ: "false"
      OCR_PROVIDER: ${OCR_PROVIDER:-paddleocr_vl}
      ENABLE_QWEN_REASONING: "false"
      QWEN_SERVICE_URL: ${QWEN_SERVICE_URL:-http://qwen:8000}
      YOLO_CONFIG_DIR: /tmp/Ultralytics
      VLLM_WORKER_MULTIPROC_METHOD: spawn
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      CC: gcc
      CXX: g++
      TRITON_CACHE_DIR: /tmp/triton-cache
    volumes:
      - ./models:/app/models:ro
      - /mnt/models:/mnt/models:ro
    runtime: ${DOCKER_RUNTIME:-nvidia}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  qwen:
    profiles: ["standalone"]
    build:
      context: .
      target: qwen
    env_file:
      - .env
    environment:
      RUN_MODE: api
      SERVICE_NAME: qwen-reasoning
      ENABLE_DATABASE: "false"
      ENABLE_RABBITMQ: "false"
      API_AUTH_MODE: none
      OCR_PROVIDER: qwen
      QWEN_SERVICE_URL: ""
      VLM_MODEL_PATH: ${VLM_MODEL_PATH:-/mnt/models/Qwen2.5-VL-7B-Instruct-AWQ}
      VLM_GPU_MEMORY_UTILIZATION: ${VLM_GPU_MEMORY_UTILIZATION:-0.20}
      YOLO_CONFIG_DIR: /tmp/Ultralytics
      VLLM_WORKER_MULTIPROC_METHOD: spawn
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      CC: gcc
      CXX: g++
      TRITON_CACHE_DIR: /tmp/triton-cache
    volumes:
      - ./models:/app/models:ro
      - /mnt/models:/mnt/models:ro
    runtime: ${DOCKER_RUNTIME:-nvidia}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/qwen/health').read()\""]
      interval: 15s
      timeout: 10s
      retries: 20
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  app-api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/vision_ai
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./models:/app/models:ro
      - /mnt/models:/mnt/models:ro

  ai-worker:
    profiles: ["prod"]
    build:
      context: .
      target: worker
    env_file:
      - .env
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/vision_ai
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./models:/app/models:ro
      - /mnt/models:/mnt/models:ro
    runtime: ${DOCKER_RUNTIME:-nvidia}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  rabbitmq:
    profiles: ["prod"]
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: vision_ai
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
