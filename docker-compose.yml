services:
  streamlit:
    profiles: ["standalone"]
    build:
      context: .
      target: streamlit
    ports:
      - "8502:8501"
    env_file:
      - .env
    environment:
      RUN_MODE: standalone
      ENABLE_DATABASE: "false"
      ENABLE_RABBITMQ: "false"
      OCR_PROVIDER: nemotron
      NEMOTRON_SERVICE_URL: http://nemotron:8000
      REASONING_ENABLED: "true"
      REASONING_SERVICE_URL: http://reasoning:8000
      YOLO_CONFIG_DIR: /tmp/Ultralytics
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ./models:/app/models:ro
      - /mnt/models:/mnt/models:ro
      - ./artifacts/results:/app/artifacts/results
    runtime: ${DOCKER_RUNTIME:-nvidia}
    depends_on:
      nemotron:
        condition: service_healthy
      reasoning:
        condition: service_started
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  nemotron:
    profiles: ["standalone", "prod"]
    build:
      context: .
      target: nemotron
    env_file:
      - .env
    environment:
      RUN_MODE: api
      SERVICE_NAME: nemotron-parse
      ENABLE_DATABASE: "false"
      ENABLE_RABBITMQ: "false"
      API_AUTH_MODE: none
      OCR_PROVIDER: nemotron
      NEMOTRON_SERVICE_URL: ""
      NEMOTRON_MODEL_DIR: ${NEMOTRON_MODEL_DIR:-/mnt/models/Nemotron-Parse-v1.2}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ./models:/app/models:ro
      - /mnt/models:/mnt/models:ro
    runtime: ${DOCKER_RUNTIME:-nvidia}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/nemotron/health').read()\""]
      interval: 15s
      timeout: 10s
      retries: 20
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  reasoning:
    profiles: ["standalone", "prod"]
    build:
      context: .
      target: reasoning
    env_file:
      - .env
    environment:
      RUN_MODE: api
      SERVICE_NAME: qwen-text-field-extraction
      ENABLE_DATABASE: "false"
      ENABLE_RABBITMQ: "false"
      OCR_PROVIDER: nemotron
      REASONING_ENABLED: "true"
      REASONING_SERVICE_URL: ""
      REASONING_MODEL_DIR: ${REASONING_MODEL_DIR:-/mnt/models/Qwen3.5-9B}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - /mnt/models:/mnt/models:ro
    runtime: ${DOCKER_RUNTIME:-nvidia}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/reasoning/health').read()\""]
      interval: 15s
      timeout: 10s
      retries: 20
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  app-api:
    profiles: ["prod"]
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/vision_ai
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./models:/app/models:ro
      - /mnt/models:/mnt/models:ro

  ai-worker:
    profiles: ["prod"]
    build:
      context: .
      target: worker
    env_file:
      - .env
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/vision_ai
      OCR_PROVIDER: nemotron
      NEMOTRON_SERVICE_URL: http://nemotron:8000
      REASONING_ENABLED: "true"
      REASONING_SERVICE_URL: http://reasoning:8000
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nemotron:
        condition: service_healthy
      reasoning:
        condition: service_started
    volumes:
      - ./models:/app/models:ro
      - /mnt/models:/mnt/models:ro
    runtime: ${DOCKER_RUNTIME:-nvidia}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  rabbitmq:
    profiles: ["prod"]
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    profiles: ["prod"]
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: vision_ai
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    profiles: ["prod"]
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
